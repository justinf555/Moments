name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a GTK4/libadwaita Rust photo management app (Moments).
            The project uses GObject subclassing, async Tokio runtime, SQLite via sqlx,
            and a centralised EventBus for component communication.

            Review this PR with focus on:

            1. **Correctness** — Does the change do what it claims? Any logic errors?
            2. **GTK/GLib safety** — Thread safety, RefCell re-entrancy, widget lifecycle
            3. **Error handling** — Are errors propagated or silently swallowed?
            4. **Architecture** — Does it follow the EventBus/command pattern in docs/design-event-bus.md?
            5. **Regressions** — Could this break existing functionality?

            Provide inline comments for specific issues.
            Use a top-level summary comment for the overall assessment.
            Be concise — flag real issues, not style preferences.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
