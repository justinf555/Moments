name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak and GNOME 50 SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//50 \
            org.gnome.Platform//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: gnome50-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gnome50-cargo-

      - name: Generate config.rs stub
        run: |
          cat > src/config.rs <<'EOF'
          pub static VERSION: &str = env!("CARGO_PKG_VERSION");
          pub static GETTEXT_PACKAGE: &str = "moments";
          pub static LOCALEDIR: &str = "/usr/share/locale";
          pub static PKGDATADIR: &str = "/usr/share/moments";
          EOF

      - name: Run tests
        run: |
          flatpak run \
            --share=network \
            --filesystem="$(pwd)" \
            --filesystem=~/.cargo:create \
            --env=SQLX_OFFLINE=true \
            --env=CARGO_HOME=$HOME/.cargo \
            --command=bash \
            org.gnome.Sdk//50 -c '
              source /usr/lib/sdk/rust-stable/enable.sh
              cd '"$(pwd)"'
              cargo test
            '

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak, GNOME 50 SDK, and mutter
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak mutter dbus-x11
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//50 \
            org.gnome.Platform//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: gnome50-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gnome50-cargo-

      - name: Generate config.rs stub
        run: |
          cat > src/config.rs <<'EOF'
          pub static VERSION: &str = env!("CARGO_PKG_VERSION");
          pub static GETTEXT_PACKAGE: &str = "moments";
          pub static LOCALEDIR: &str = "/usr/share/locale";
          pub static PKGDATADIR: &str = "/usr/share/moments";
          EOF

      - name: Run integration tests
        run: |
          export XDG_RUNTIME_DIR=/tmp/runtime-$$
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          # Write a wrapper script that mutter will exec — at that point
          # WAYLAND_DISPLAY is set and the socket exists.
          cat > /tmp/run-tests.sh <<SCRIPT
          #!/bin/bash
          set -e
          flatpak run \
            --share=network \
            --filesystem="$(pwd)" \
            --filesystem=~/.cargo:create \
            --filesystem=\$XDG_RUNTIME_DIR \
            --env=SQLX_OFFLINE=true \
            --env=CARGO_HOME=$HOME/.cargo \
            --env=GSK_RENDERER=cairo \
            --env=GTK_A11Y=none \
            --env=GIO_USE_VFS=local \
            --env=XDG_RUNTIME_DIR=\$XDG_RUNTIME_DIR \
            --env=WAYLAND_DISPLAY=\$WAYLAND_DISPLAY \
            --command=bash \
            org.gnome.Sdk//50 -c '
              source /usr/lib/sdk/rust-stable/enable.sh
              cd $(pwd)
              cargo test --features integration-tests -- --test-threads=1
            '
          SCRIPT
          chmod +x /tmp/run-tests.sh

          dbus-run-session \
            mutter --headless --wayland --no-x11 --virtual-monitor 1024x768 -- \
            /tmp/run-tests.sh
