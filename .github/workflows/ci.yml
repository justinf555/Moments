name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  pull-requests: write

env:
  SQLX_OFFLINE: "true"
  # Isolated CARGO_HOME avoids rustup shims in ~/.cargo/bin shadowing
  # the Flatpak SDK's toolchain.
  CARGO_HOME_SDK: /tmp/flatpak-cargo

jobs:
  lint:
    name: Clippy lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Flatpak SDK
        uses: actions/cache@v4
        with:
          path: /var/lib/flatpak
          key: flatpak-gnome50-sdk-v1

      - name: Install Flatpak and GNOME 50 SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//50 \
            org.gnome.Platform//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: gnome50-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gnome50-cargo-

      - name: Generate config.rs stub
        run: |
          cat > src/config.rs <<'EOF'
          pub static VERSION: &str = env!("CARGO_PKG_VERSION");
          pub static GETTEXT_PACKAGE: &str = "moments";
          pub static LOCALEDIR: &str = "/usr/share/locale";
          pub static PKGDATADIR: &str = "/usr/share/moments";
          pub static APP_ID: &str = "io.github.justinf555.Moments";
          pub static PROFILE: &str = "default";
          EOF

      - name: Run clippy
        run: |
          flatpak run --share=network \
            --filesystem="$(pwd)" \
            --filesystem=~/.cargo/registry:ro \
            --filesystem=~/.cargo/git:ro \
            --env=SQLX_OFFLINE=true \
            --env=CARGO_HOME=$CARGO_HOME_SDK \
            --command=bash org.gnome.Sdk//50 -c '
              source /usr/lib/sdk/rust-stable/enable.sh
              mkdir -p $CARGO_HOME/bin
              ln -sf ~/.cargo/registry $CARGO_HOME/registry 2>/dev/null
              ln -sf ~/.cargo/git $CARGO_HOME/git 2>/dev/null
              cd '"$(pwd)"'
              cargo clippy --all-targets -- -D warnings
            '

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Flatpak SDK
        uses: actions/cache@v4
        with:
          path: /var/lib/flatpak
          key: flatpak-gnome50-sdk-v1

      - name: Install Flatpak and GNOME 50 SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//50 \
            org.gnome.Platform//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: gnome50-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gnome50-cargo-

      - name: Generate config.rs stub
        run: |
          cat > src/config.rs <<'EOF'
          pub static VERSION: &str = env!("CARGO_PKG_VERSION");
          pub static GETTEXT_PACKAGE: &str = "moments";
          pub static LOCALEDIR: &str = "/usr/share/locale";
          pub static PKGDATADIR: &str = "/usr/share/moments";
          pub static APP_ID: &str = "io.github.justinf555.Moments";
          pub static PROFILE: &str = "default";
          EOF

      - name: Run tests
        run: |
          flatpak run --share=network \
            --filesystem="$(pwd)" \
            --filesystem=~/.cargo/registry:create \
            --filesystem=~/.cargo/git:create \
            --env=SQLX_OFFLINE=true \
            --env=CARGO_HOME=$CARGO_HOME_SDK \
            --command=bash org.gnome.Sdk//50 -c '
              source /usr/lib/sdk/rust-stable/enable.sh
              mkdir -p $CARGO_HOME/bin
              ln -sf ~/.cargo/registry $CARGO_HOME/registry 2>/dev/null
              ln -sf ~/.cargo/git $CARGO_HOME/git 2>/dev/null
              export PATH=$CARGO_HOME/bin:$PATH
              cd '"$(pwd)"'
              cargo install cargo-nextest --locked 2>/dev/null || true
              cargo nextest run --profile ci
            '

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          files: target/nextest/ci/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Flatpak SDK
        uses: actions/cache@v4
        with:
          path: /var/lib/flatpak
          key: flatpak-gnome50-sdk-v1

      - name: Install Flatpak and GNOME 50 SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//50 \
            org.gnome.Platform//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: gnome50-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gnome50-cargo-

      - name: Generate config.rs stub
        run: |
          cat > src/config.rs <<'EOF'
          pub static VERSION: &str = env!("CARGO_PKG_VERSION");
          pub static GETTEXT_PACKAGE: &str = "moments";
          pub static LOCALEDIR: &str = "/usr/share/locale";
          pub static PKGDATADIR: &str = "/usr/share/moments";
          pub static APP_ID: &str = "io.github.justinf555.Moments";
          pub static PROFILE: &str = "default";
          EOF

      - name: Generate coverage
        run: |
          flatpak run --share=network \
            --filesystem="$(pwd)" \
            --filesystem=~/.cargo/registry:create \
            --filesystem=~/.cargo/git:create \
            --env=SQLX_OFFLINE=true \
            --env=CARGO_HOME=$CARGO_HOME_SDK \
            --command=bash org.gnome.Sdk//50 -c '
              source /usr/lib/sdk/rust-stable/enable.sh
              mkdir -p $CARGO_HOME/bin
              ln -sf ~/.cargo/registry $CARGO_HOME/registry 2>/dev/null
              ln -sf ~/.cargo/git $CARGO_HOME/git 2>/dev/null
              export PATH=$CARGO_HOME/bin:$PATH
              cd '"$(pwd)"'
              cargo install cargo-llvm-cov --locked 2>/dev/null || true
              cargo llvm-cov --lcov --output-path lcov.info
            '

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Flatpak SDK
        uses: actions/cache@v4
        with:
          path: /var/lib/flatpak
          key: flatpak-gnome50-sdk-v1

      - name: Install Flatpak, GNOME 50 SDK, and mutter
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak mutter dbus-x11
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//50 \
            org.gnome.Platform//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: gnome50-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gnome50-cargo-

      - name: Generate config.rs stub
        run: |
          cat > src/config.rs <<'EOF'
          pub static VERSION: &str = env!("CARGO_PKG_VERSION");
          pub static GETTEXT_PACKAGE: &str = "moments";
          pub static LOCALEDIR: &str = "/usr/share/locale";
          pub static PKGDATADIR: &str = "/usr/share/moments";
          pub static APP_ID: &str = "io.github.justinf555.Moments";
          pub static PROFILE: &str = "default";
          EOF

      - name: Run integration tests
        run: |
          export XDG_RUNTIME_DIR=/tmp/runtime-$$
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          cat > /tmp/run-tests.sh <<SCRIPT
          #!/bin/bash
          set -e
          flatpak run --share=network \
            --filesystem="$(pwd)" \
            --filesystem=~/.cargo/registry:ro \
            --filesystem=~/.cargo/git:ro \
            --filesystem=\$XDG_RUNTIME_DIR \
            --env=SQLX_OFFLINE=true \
            --env=CARGO_HOME=$CARGO_HOME_SDK \
            --env=GSK_RENDERER=cairo \
            --env=GTK_A11Y=none \
            --env=GIO_USE_VFS=local \
            --env=XDG_RUNTIME_DIR=\$XDG_RUNTIME_DIR \
            --env=WAYLAND_DISPLAY=\$WAYLAND_DISPLAY \
            --command=bash org.gnome.Sdk//50 -c '
              source /usr/lib/sdk/rust-stable/enable.sh
              mkdir -p \$CARGO_HOME/bin
              ln -sf ~/.cargo/registry \$CARGO_HOME/registry 2>/dev/null
              ln -sf ~/.cargo/git \$CARGO_HOME/git 2>/dev/null
              cd $(pwd)
              cargo test --features integration-tests -- --test-threads=1
            '
          SCRIPT
          chmod +x /tmp/run-tests.sh

          dbus-run-session \
            mutter --headless --wayland --no-x11 --virtual-monitor 1024x768 -- \
            /tmp/run-tests.sh

  # ── PR Summary Comment ──────────────────────────────────────────────
  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, integration-tests]
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-summary
          message: |
            ## 🔨 CI Summary

            | Check | Status |
            |-------|--------|
            | Clippy lint | ${{ needs.lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | Unit tests | ${{ needs.test.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | Integration tests | ${{ needs.integration-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | Coverage | ${{ needs.coverage.result == 'success' && '✅ Pass' || '❌ Fail' }} |

            <sub>[full run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
