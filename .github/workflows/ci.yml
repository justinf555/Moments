name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: build-aux/io.github.justinf555.Moments.ci.json
          run-tests: true
          bundle: moments-devel.flatpak
          cache-key: flatpak-builder-${{ hashFiles('build-aux/io.github.justinf555.Moments.ci.json', 'Cargo.lock') }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: build-aux/io.github.justinf555.Moments.ci.json
          run-tests: false
          build-bundle: false
          upload-artifact: false
          keep-build-dirs: true
          cache-key: flatpak-builder-${{ hashFiles('build-aux/io.github.justinf555.Moments.ci.json', 'Cargo.lock') }}

      - name: Run coverage inside build sandbox
        run: |
          xvfb-run flatpak-builder --run flatpak_app \
            build-aux/io.github.justinf555.Moments.ci.json \
            bash -c '
              export SQLX_OFFLINE=true
              export PATH=/usr/lib/sdk/rust-stable/bin:$PATH
              cargo install cargo-llvm-cov --locked 2>/dev/null || true
              export PATH=$CARGO_HOME/bin:$PATH
              cargo llvm-cov \
                --manifest-path /run/build/moments/Cargo.toml \
                --target-dir /run/build/moments/_flatpak_build/src \
                --lcov --output-path /run/build/moments/lcov.info
            '
          # Extract lcov.info from the build directory
          find .flatpak-builder -name "lcov.info" -exec cp {} lcov.info \; 2>/dev/null || \
            find flatpak_app -name "lcov.info" -exec cp {} lcov.info \; 2>/dev/null || true

      - name: Upload to Codecov
        if: hashFiles('lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [build-and-test, coverage]
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-summary
          message: |
            ## CI Summary

            | Check | Status |
            |-------|--------|
            | Build & test (clippy + unit + integration) | ${{ needs.build-and-test.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | Coverage | ${{ needs.coverage.result == 'success' && '✅ Pass' || '❌ Fail' }} |

            <sub>[full run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
