name: Metrics

on:
  pull_request:
  push:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  complexity:
    name: Code complexity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install rust-code-analysis
        run: cargo install rust-code-analysis-cli --locked

      - name: Run complexity analysis
        id: metrics
        run: |
          REPORT=$(rust-code-analysis-cli --metrics -O json -p src/ 2>/dev/null | \
            python3 -c "
          import json, sys

          funcs = []
          def walk(node, file=''):
              kind = node.get('kind', '')
              if kind == 'function':
                  name = node.get('name', '<anon>')
                  cc = node.get('metrics', {}).get('cognitive', {}).get('sum', 0)
                  sloc = node.get('metrics', {}).get('loc', {}).get('sloc', 0)
                  if cc and cc > 0:
                      funcs.append((cc, sloc, file, name))
              for space in node.get('spaces', []):
                  walk(space, file)

          for line in sys.stdin:
              line = line.strip()
              if not line:
                  continue
              try:
                  entry = json.loads(line)
                  walk(entry, entry.get('name', ''))
              except json.JSONDecodeError:
                  continue

          funcs.sort(reverse=True)
          print(f\"{'Complexity':>10}  {'SLOC':>6}  Function\")
          print(f\"{'─'*10:>10}  {'─'*6:>6}  {'─'*50}\")
          for cc, sloc, f, name in funcs[:20]:
              short_f = f.replace('src/', '')
              print(f'{cc:>10.0f}  {sloc:>6.0f}  {short_f}::{name}')
          " 2>&1 || echo "Analysis failed")

          # Save to job summary.
          echo "## Code Complexity Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$REPORT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Save for PR comment.
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-complexity
          message: |
            ## 📊 Code Complexity Report

            ```
            ${{ steps.metrics.outputs.report }}
            ```

            <sub>Top 20 functions by cognitive complexity · [job log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
