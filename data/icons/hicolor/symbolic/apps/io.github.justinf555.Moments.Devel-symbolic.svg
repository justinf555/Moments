<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Back photo card -->
  <rect x="4" y="1" width="11" height="11" rx="1" ry="1" fill="none" stroke="#2e3436" stroke-width="1" transform="rotate(6, 9.5, 6.5)" opacity="0.4"/>

  <!-- Front photo card -->
  <rect x="1" y="3" width="11" height="11" rx="1" ry="1" fill="none" stroke="#2e3436" stroke-width="1.2"/>

  <!-- Mountain landscape inside front card -->
  <polygon points="2,12 5.5,7 9,12" fill="#2e3436" opacity="0.5"/>
  <polygon points="5,13 8.5,8 12,13" fill="#2e3436"/>

  <!-- Sun -->
  <circle cx="10" cy="5.5" r="1.5" fill="#2e3436"/>
</svg>
